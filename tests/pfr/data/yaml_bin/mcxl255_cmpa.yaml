# ==========================  PFR CMPA configuration template for mcxl255, Revision: latest  ===========================

# ======================================================================================================================
#                                                 == General Options ==                                                 
# ======================================================================================================================
# -------------------------------------===== The chip family name [Required] =====--------------------------------------
# Description: NXP chip family identifier.
family: mcxl255
# -----------------------------------------===== MCU revision [Optional] =====------------------------------------------
# Description: Revision of silicon. The 'latest' name, means most current revision.
# Possible options: <a0, a1, latest>
revision: latest
# ------------------------------------===== Configuration area type [Required] =====------------------------------------
# Description: PFR / IFR type
# Possible options: <CMPA, cmpa>
type: CMPA
# --------------------------------------------===== mcxl255 [Required] =====--------------------------------------------
settings:
  # ------------------------------------------===== BOOT_CFG [Optional] =====-------------------------------------------
  # Description: Offset: 0x00000000, Width: 32b; Boot configuration
  BOOT_CFG:
    # ----------------------------------------===== ISP_BOOT_IF [Optional] =====----------------------------------------
    # Description: Offset: 4b, Width: 3b, ISP boot interface
    # - AUTO_ISP, (0): Auto ISP
    # - UART_ISP, (1): UART ISP
    # - SPI_SLAVE_ISP, (2): SPI Slave ISP
    # - I2C_SLAVE_ISP, (3): I2C slave ISP
    # Possible options: <AUTO_ISP, UART_ISP, SPI_SLAVE_ISP, I2C_SLAVE_ISP>
    ISP_BOOT_IF: AUTO_ISP
    # ----------------------------------------===== BOOT_SPEED [Optional] =====-----------------------------------------
    # Description: Offset: 12b, Width: 2b, Metal option to select boot clock source
    # - 48_MHZ, (0): 48 MHz
    # - 96_MHZ, (1): 96 MHz
    # Possible options: <48_MHZ, 96_MHZ>
    BOOT_SPEED: 48_MHZ
    # ----------------------------------------===== AGDET_RE_EN [Optional] =====----------------------------------------
    # Description: Offset: 14b, Width: 2b, Enablement and arming of security detectors (LVD, HVD, AGDET)
    # - ENABLED/ARMED, (0): Enabled/Armed
    # - DISABLED/DISARMED, (1): Disabled/Disarmed
    # - ENABLED/ARMED_2, (2): Enabled/Armed
    # - ENABLED/ARMED_3, (3): Enabled/Armed
    # Possible options: <ENABLED/ARMED, DISABLED/DISARMED, ENABLED/ARMED_2, ENABLED/ARMED_3>
    AGDET_RE_EN: ENABLED/ARMED
    # ------------------------------------------===== HEADER [Optional] =====-------------------------------------------
    # Description: Offset: 16b, Width: 16b, Header
    HEADER: 22883
  # ------------------------------------------===== FLASH_CFG [Optional] =====------------------------------------------
  # Description: Offset: 0x00000004, Width: 32b; Flash configuration
  FLASH_CFG:
    # --------------------------------------===== FLASH_REMAP_SZ [Optional] =====---------------------------------------
    # Description: Offset: 0b, Width: 7b, Flash remap size. FLASH_REMAP_SIZE defines the size of the secondary boot
    # image (the range of flash addresses that will be remapped)in internal flash, where remapped address end =
    # (FLASH_REMAP_SIZE + 1)
    FLASH_REMAP_SZ: 0
    # ---------------------------------------===== ISP_PIN_ENTRY [Optional] =====---------------------------------------
    # Description: Offset: 10b, Width: 2b, Disable ISP mode entry through pin assertion
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_PIN_ENTRY: ISP_ENTRY_ALLOWED_0
    # ---------------------------------------===== ISP_DM_ENTRY [Optional] =====----------------------------------------
    # Description: Offset: 12b, Width: 2b, Disable ISP mode entry through debug mailbox command
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_DM_ENTRY: ISP_ENTRY_ALLOWED_0
  # ---------------------------------------===== BOOT_LED_STATUS [Optional] =====---------------------------------------
  # Description: Offset: 0x00000008, Width: 32b; Boot LED status
  BOOT_LED_STATUS:
    # ---------------------------------------===== BOOT_FAIL_LED [Optional] =====---------------------------------------
    # Description: Offset: 16b, Width: 8b, Assert on fatal errors during boot. ROM toggles the GPIO pin identified by
    # this field whenever primary boot fails due to fatal errors before locking-up/reset. Note, use QUICK_SET_/CLR_GPIOx
    # field to set the default level of pin. [4:0] GPIO Pin number [7:5] GPIO port number
    BOOT_FAIL_LED: 0
  # -----------------------------------------===== BOOT_TIMERS [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000000C, Width: 32b; Boot timers
  BOOT_TIMERS:
    # ----------------------------------===== POWERDOWN_TIMEOUT_SECS [Optional] =====-----------------------------------
    # Description: Offset: 0b, Width: 16b, Powerdown timeout: Timeout value in seconds. When a non-zero value is
    # programmed in this field ROM uses it as idle timeout value to enter power-down state to conserve power
    POWERDOWN_TIMEOUT_SECS: 0
  # ----------------------------------------===== ISP_UART_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000010, Width: 32b; ISP UART configuration
  ISP_UART_CFG:
    # ----------------------------------------===== UART_RX_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default UART RX ISP pin. Identifies the pin to be used as UART_RX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    UART_RX_PIN: 0
    # -------------------------------------===== UART_RX_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the pin mux function slot
    UART_RX_FUNC_SLOT: 0
    # -------------------------------------===== UART_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for UART ISP mode
    UART_ISP_FLEXCOM: 0
    # ----------------------------------------===== UART_TX_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default UART TX ISP pin. Identifies the pin to be used as UART_TX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    UART_TX_PIN: 0
    # -------------------------------------===== UART_TX_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the pin mux function slot
    UART_TX_FUNC_SLOT: 0
    # --------------------------------------===== UART_BAUD_RATE [Optional] =====---------------------------------------
    # Description: Offset: 28b, Width: 4b, UART baud rate. Baud rate configured during UART ISP mode
    # - AUTO_BAUD_DETECTION, (0): Auto baud detection
    # Possible options: <AUTO_BAUD_DETECTION>
    UART_BAUD_RATE: AUTO_BAUD_DETECTION
  # -----------------------------------------===== ISP_I2C_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000014, Width: 32b; ISP I2C configuration
  ISP_I2C_CFG:
    # ----------------------------------------===== I2C_SCL_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default UART RX ISP pin. Identifies the pin to be used as UART_RX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    I2C_SCL_PIN: 0
    # -------------------------------------===== I2C_SCL_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the pin mux function slot
    I2C_SCL_FUNC_SLOT: 0
    # --------------------------------------===== I2C_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for UART ISP mode
    I2C_ISP_FLEXCOM: 0
    # ----------------------------------------===== I2C_SDA_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default UART TX ISP pin. Identifies the pin to be used as UART_TX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    I2C_SDA_PIN: 0
    # -------------------------------------===== I2C_SDA_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the pin mux function slot
    I2C_SDA_FUNC_SLOT: 0
  # ----------------------------------------===== ISP_SPI_CFG0 [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000001C, Width: 32b; ISP SPI configuration0
  ISP_SPI_CFG0:
    # ----------------------------------------===== SPI_SCK_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default SPI_SCK ISP pin. Identifies the pin to be used as SPI_SCK
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_SCK_PIN: 0
    # -------------------------------------===== SPI_SCK_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the pin mux function slot
    SPI_SCK_FUNC_SLOT: 0
    # --------------------------------------===== SPI_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for SPI ISP mode
    SPI_ISP_FLEXCOM: 0
    # ---------------------------------------===== SPI_MOSI_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default SPI_MOSI ISP pin. Identifies the pin to be used as SPI_MOSI
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_MOSI_PIN: 0
    # ------------------------------------===== SPI_MOSI_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the pin mux function slot
    SPI_MOSI_FUNC_SLOT: 0
  # ----------------------------------------===== ISP_SPI_CFG1 [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000020, Width: 32b; ISP SPI configuration1
  ISP_SPI_CFG1:
    # ---------------------------------------===== SPI_MISO_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default SPI_MISO ISP pin. Identifies the pin to be used as SPI_MISO
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_MISO_PIN: 0
    # ------------------------------------===== SPI_MISO_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the pin mux function slot
    SPI_MISO_FUNC_SLOT: 0
    # ---------------------------------------===== SPI_SSEL_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default SPI_SSEL ISP pin. Identifies the pin to be used as SPI_SSEL
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_SSEL_PIN: 0
    # ------------------------------------===== SPI_SSEL_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the pin mux function slot
    SPI_SSEL_FUNC_SLOT: 0
    # --------------------------------------===== ISP_SPI_SSEL_X [Optional] =====---------------------------------------
    # Description: Offset: 28b, Width: 2b, SPI chip select number. FlexComm SPI interfaces supports up to four chip
    # selects
    ISP_SPI_SSEL_X: 0
  # ----------------------------------------===== ISP_MISC_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000002C, Width: 32b; ISP misc configuration
  ISP_MISC_CFG:
    # ---------------------------------------===== ISP_SPI_CUST [Optional] =====----------------------------------------
    # Description: Offset: 26b, Width: 2b, Use customer defined SPI ISP pins
    # - DEFAULT_0, (0): Default ROM defined pins
    # - CUST_DEFINED, (1): Customer defined
    # - DEFAULT_2, (2): Default ROM defined pins
    # - DEFAULT_3, (3): Default ROM defined pins
    # Possible options: <DEFAULT_0, CUST_DEFINED, DEFAULT_2, DEFAULT_3>
    ISP_SPI_CUST: DEFAULT_0
    # ---------------------------------------===== ISP_I2C_CUST [Optional] =====----------------------------------------
    # Description: Offset: 28b, Width: 2b, Use customer defined I2C ISP pins
    # - DEFAULT_0, (0): Default ROM defined pins
    # - CUST_DEFINED, (1): Customer defined
    # - DEFAULT_2, (2): Default ROM defined pins
    # - DEFAULT_3, (3): Default ROM defined pins
    # Possible options: <DEFAULT_0, CUST_DEFINED, DEFAULT_2, DEFAULT_3>
    ISP_I2C_CUST: DEFAULT_0
    # ---------------------------------------===== ISP_UART_CUST [Optional] =====---------------------------------------
    # Description: Offset: 30b, Width: 2b, Use customer defined UART ISP pins
    # - DEFAULT_0, (0): Default ROM defined pins
    # - CUST_DEFINED, (1): Customer defined
    # - DEFAULT_2, (2): Default ROM defined pins
    # - DEFAULT_3, (3): Default ROM defined pins
    # Possible options: <DEFAULT_0, CUST_DEFINED, DEFAULT_2, DEFAULT_3>
    ISP_UART_CUST: DEFAULT_0
  # ----------------------------------------===== Misc_Control [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000003C, Width: 32b; Misc Control
  Misc_Control: '0x00000000'
