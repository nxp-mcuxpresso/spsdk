    # XOM_UNLOCKED, XOM_LOCKED, NO_ACCESS_LOCKED>
    ACL_SEC_4: ROM_RX_UNLOCKED
    # -----------------------------------------===== ACL_SEC_5 [Optional] =====-----------------------------------------
    # Description: Offset: 20b, Width: 3b, Access control for flash sector (offset range 0x00_A000 - 0x00_BFFF)
