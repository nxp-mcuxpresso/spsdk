    # XOM_UNLOCKED, XOM_LOCKED, NO_ACCESS_LOCKED>
    ACL_SEC_2: ROM_RX_UNLOCKED
    # -----------------------------------------===== ACL_SEC_3 [Optional] =====-----------------------------------------
