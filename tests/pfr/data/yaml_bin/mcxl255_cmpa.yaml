    # -----------------------------------------===== ACL_SEC_0 [Optional] =====-----------------------------------------
    # Description: Offset: 0b, Width: 3b, Access control for flash sector (offset range 0x00_0000 - 0x00_1FFF)
    # - DEFAULT_RW_UNLOCKED, (0): Data flash and unlocked (RW__). Default flash behavior with read and write access
    # only. Instruction fetches (execute access) are blocked and generates security violation. Blocks assigned with this
    # access control index can be changed to another index by software. This configuration register is unlocked and
    # updatable by application
    # - DATA_RW_LOCKED, (1): Data flash and locked (RW_L). Read and write operations are allowed but execution is
    # blocked. Blocks assigned with this access control index cannot be changed to another index until next reset
    # - ROM_RX_LOCKED, (2): Read only Memory (ROM) and locked (R_XL). Read & execute operations are allowed but write is
    # blocked. Blocks assigned with this access control index cannot be changed to another index until next reset
    # - DATA_ROM_LOCKED, (3): Data Read only memory (DROM) and locked (R__L). Read operations is allowed but write &
    # execute are blocked. Blocks assigned with this access control index cannot be changed to another index until next
    # reset
    # - ROM_RX_UNLOCKED, (4): Read-Only-Memory (ROM) and un-locked (R_X_). Read & execute operations are allowed but
    # write is blocked. Blocks assigned with this access control index can be changed to another index by software. This
    # configuration register is unlocked and updatable by application
    # - XOM_UNLOCKED, (5): eXecute-only Memory (XOM) and un-locked (__X_). Execute operations are allowed but read &
    # write are blocked. Blocks assigned with this access control index can be changed to another index by software.
    # This configuration register is unlocked and updatable by application
    # - XOM_LOCKED, (6): eXecute-Only-Memory (XOM) and locked (__XL). Execute operations are allowed but read & write
    # are blocked. Blocks assigned with this access control index cannot be changed to another index until next reset
    # - NO_ACCESS_LOCKED, (7): Hidden (___L). Read, Write & execute operations are blocked. Once this access control
    # index is assigned to a block, the memory range associated with block is hidden until next reset
    # Possible options: <DEFAULT_RW_UNLOCKED, DATA_RW_LOCKED, ROM_RX_LOCKED, DATA_ROM_LOCKED, ROM_RX_UNLOCKED,
    # XOM_UNLOCKED, XOM_LOCKED, NO_ACCESS_LOCKED>
    ACL_SEC_0: ROM_RX_UNLOCKED
    # -----------------------------------------===== ACL_SEC_1 [Optional] =====-----------------------------------------
    # Description: Offset: 4b, Width: 3b, Access control for flash sector (offset range 0x00_2000 - 0x00_3FFF)
    # - DEFAULT_RW_UNLOCKED, (0): Data flash and unlocked (RW__). Default flash behavior with read and write access
    # only. Instruction fetches (execute access) are blocked and generates security violation. Blocks assigned with this
