    # ---------------------------------------===== VENDOR_USAGE [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 16b, Upper 16 bits of vendor usage field defined in DAP. Lower 16-bits come from
    # customer field area (CFPA.DBG_REVOKE_VU)
    VENDOR_USAGE: 0
  # ---------------------------------------===== SECURE_BOOT_CFG [Optional] =====---------------------------------------
  # Description: Offset: 0x00000050, Width: 32b; Secure boot configuration
  SECURE_BOOT_CFG:
    # ----------------------------------------===== SEC_BOOT_EN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 2b, Secure boot enforcement. This field defines the minimum image verification
    # procedure (CRC32, CMAC, ECDSA sign). The Image type field in header indicates the type of verification data
    # (checksum or signature) included in it
    # - ALL_IMAGE_TYPES_ALLOWED, (0): All Image types are allowed
    # - ONLY_CRC32_OR_CRYPTO_SIG, (1): Only CRC32 or cryptographically signed (CMAC or ECDSA or MLDSA) images are
    # allowed
    # - ONLY_CRYPTO_SIGNED, (2): Only cryptographically Signed (CMAC or ECDSA or MLDSA) images are allowed
    # - ONLY_PKI_SIGNED, (3): Only PKI signed (ECDSA or MLDSA) images are allowed
    # Possible options: <ALL_IMAGE_TYPES_ALLOWED, ONLY_CRC32_OR_CRYPTO_SIG, ONLY_CRYPTO_SIGNED, ONLY_PKI_SIGNED>
    SEC_BOOT_EN: ALL_IMAGE_TYPES_ALLOWED
    # ----------------------------------------===== LP_SEC_BOOT [Optional] =====----------------------------------------
    # Description: Offset: 3b, Width: 2b, LP_SEC_BOOT: Secure boot option for low-power wake from power-down & deep-
    # power down. For CFPA/CMPA do CRC check always
    # - COLD_BOOT, (0): Same as cold boot
    # - CRC32_IMG, (1): CRC check for CFPA/CMPA & CRC32 check of active image. Uses AHB_CRC image type to check image
    # CRC and loads TZ-M preset data if present before jumping to the image
    # - VECTOR_ADDR, (2): CRC check for CFPA/CMPA & jump to vector address specified in CFPA
    # - CMAC, (3): CRC check for CFPA/CMPA & CMAC check of active image. Uses AHB_CRC image type to check image CRC and
    # loads TZ-M preset data if present before jumping to the image
    # Possible options: <COLD_BOOT, CRC32_IMG, VECTOR_ADDR, CMAC>
    LP_SEC_BOOT: COLD_BOOT
    # -------------------------------------===== DICE_CSR_KEY_TYPE [Optional] =====-------------------------------------
    # Description: Offset: 6b, Width: 2b, Define the DICE csr and key generation type
    # - GEN_DICE_ECC_P384_KEYS_0, (0): Generate DICE ECC P-384 keys
    # - GEN_DICE_ECC_P384_KEYS_1, (1): Generate DICE ECC P-384 keys
    # - GEN_DICE_SHA384_MLDSA_2, (2): Generate DICE SHA384 & MLDSA keys
    # - GEN_DICE_SHA384_MLDSA_3, (3): Generate DICE SHA384 & MLDSA keys
    # Possible options: <GEN_DICE_ECC_P384_KEYS_0, GEN_DICE_ECC_P384_KEYS_1, GEN_DICE_SHA384_MLDSA_2,
    # GEN_DICE_SHA384_MLDSA_3>
    DICE_CSR_KEY_TYPE: GEN_DICE_ECC_P384_KEYS_0
    # -----------------------------------------===== ENF_CNSA [Optional] =====------------------------------------------
    # Description: Offset: 8b, Width: 2b, Enforce CNSA suite approved algorithms for secure boot, secure update and
    # debug authentication
    # - AT_LEAST_CNSA_10_ALGORI_0, (0): At least CNSA 1.0 algorithms are used. (ECC P-384)
    # - AT_LEAST_CNSA_10_ALGORI_1, (1): At least CNSA 1.0 algorithms are used. (ECC P-384)
    # - ONLY_CNSA_20_ALGORITHMS_2, (2): Only CNSA 2.0 algorithms are used.(ECDSA P-384 + MLDSA-87)
    # - ONLY_CNSA_20_ALGORITHMS_3, (3): Only CNSA 2.0 algorithms are used.(ECDSA P-384 + MLDSA-87)
    # Possible options: <AT_LEAST_CNSA_10_ALGORI_0, AT_LEAST_CNSA_10_ALGORI_1, ONLY_CNSA_20_ALGORITHMS_2,
    # ONLY_CNSA_20_ALGORITHMS_3>
    ENF_CNSA: AT_LEAST_CNSA_10_ALGORI_0
    # --------------------------------------===== ENF_TZM_PRESET [Optional] =====---------------------------------------
    # Description: Offset: 10b, Width: 2b, TrustZone-M mode
    # - IGNORED, (0): Ignored
    # - ENFORCE_PRESET_TZM_DATA_1, (1): Enforce preset TZM data in image manifest
    # - ENFORCE_PRESET_TZM_DATA_2, (2): Enforce preset TZM data in image manifest
    # - ENFORCE_PRESET_TZM_DATA_3, (3): Enforce preset TZM data in image manifest
    # Possible options: <IGNORED, ENFORCE_PRESET_TZM_DATA_1, ENFORCE_PRESET_TZM_DATA_2, ENFORCE_PRESET_TZM_DATA_3>
    ENF_TZM_PRESET: IGNORED
    # ---------------------------------------===== ITRC_ZEROIZE [Optional] =====----------------------------------------
    # Description: Offset: 12b, Width: 2b, RAM zeroize on ITRC event. Zeroize long-term storage RAM (RAMA) on subsequent
    # boot when Intrusion & Tamper control signals an intrusion event (ITRC_OUT3)
    # - NO_ACTION, (0): No action
    # - ALWAYS_ZEROIZE_PKC_RAM_ON, (1): Always Zeroize PKC RAM on ITRC event only
    # - ZEROIZE_PKC_&_RAMA_ON_ITR, (2): Zeroize PKC & RAMA on ITRC event only
    # - ALWAYS_ZEROIZE_PKC_&_RAMA, (3): Always Zeroize PKC & RAMA on all reset boot
    # Possible options: <NO_ACTION, ALWAYS_ZEROIZE_PKC_RAM_ON, ZEROIZE_PKC_&_RAMA_ON_ITR, ALWAYS_ZEROIZE_PKC_&_RAMA>
    ITRC_ZEROIZE: NO_ACTION
    # --------------------------------------===== ACTIVE_IMG_PROT [Optional] =====--------------------------------------
    # Description: Offset: 14b, Width: 2b, Protection of active image. This field defines protection of flash area
    # occupied by the active image. Only applicable to internal flash
    # - PROTECT_CFPA_FLASH_ACL, (0): Protection is defined using the CFPA FLASH_ACL settings
    # - WP_ACT_IMG_STICKY_GLBAC2, (1): Write protect active image area with sticky lock. GLBAC2 is used. FLASH_ACL
    # settings are ignored
    # - WP_ACT_IMG_NOSTKY_GLBAC4, (2): Write protect active image area without sticky lock. GLBAC4 is used. FLASH_ACL
    # settings are ignored
    # - XOM_ACT_IMG_STICKY_GLBAC6, (3): XOM protect active image area with sticky lock. GLBAC6 is used. FLASH_ACL
    # settings are ignored
    # Possible options: <PROTECT_CFPA_FLASH_ACL, WP_ACT_IMG_STICKY_GLBAC2, WP_ACT_IMG_NOSTKY_GLBAC4,
    # XOM_ACT_IMG_STICKY_GLBAC6>
    ACTIVE_IMG_PROT: PROTECT_CFPA_FLASH_ACL
    # ---------------------------------------===== FIPS_SHA_STEN [Optional] =====---------------------------------------
    # Description: Offset: 16b, Width: 2b, Enable self-test for SHA2 block on power-up. Needed for FIPS certification.
    # If this field is non-zero run self-test and log result in SYSCON->ELS_AS_BOOT_LOG1[FIPS]
    # - NOT_INCLUDED, (0): not included
    # - ON_FAIL_CONTINUE_BOOT, (1): On failure continue to boot
    # - ON_FAIL_ISP_RECOVERY, (2): On failure enter ISP mode for recovery
    # - ON_FAIL_LOCK_DEVICE, (3): On failure lock the device to enforce power-cycle
    # Possible options: <NOT_INCLUDED, ON_FAIL_CONTINUE_BOOT, ON_FAIL_ISP_RECOVERY, ON_FAIL_LOCK_DEVICE>
    FIPS_SHA_STEN: NOT_INCLUDED
