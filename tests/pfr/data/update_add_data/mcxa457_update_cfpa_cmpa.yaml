# ========================  PFR CFPA_CMPA configuration template for mcxa457, Revision: latest  ========================

# ======================================================================================================================
#                                                 == General Options ==
# ======================================================================================================================
# -------------------------------------===== The chip family name [Required] =====--------------------------------------
# Description: NXP chip family identifier.
family: mcxa457
# -----------------------------------------===== MCU revision [Optional] =====------------------------------------------
# Description: Revision of silicon. The 'latest' name, means most current revision.
# Possible options: <a0, latest>
revision: latest
# ------------------------------------===== Configuration area type [Required] =====------------------------------------
# Description: PFR / IFR type
# Possible options: <CFPA_CMPA, cfpa_cmpa>
type: UPDATE_CFPA_CMPA
# --------------------------------------------===== mcxa457 [Required] =====--------------------------------------------
# settings_update: pfr_update.yaml
settings_cfpa: mcxa457_cfpa.yaml
settings_cmpa: mcxa457_cmpa.yaml
