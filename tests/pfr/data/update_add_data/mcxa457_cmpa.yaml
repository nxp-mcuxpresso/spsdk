    VENDOR_USAGE: 0
  # ---------------------------------------===== SECURE_BOOT_CFG [Optional] =====---------------------------------------
  # Description: Offset: 0x00000250, Width: 32b; secure boot cfg
  SECURE_BOOT_CFG:
    # ----------------------------------------===== SEC_BOOT_EN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 2b, Secure boot enforcement. This field defines the minimum image verification
    # procedure (CRC32, CMAC, ECDSA sign). The Image type field in header indicates the type of verification data
    # (checksum or signature) included in it
    # - ALL_IMAGE_TYPES_ALLOWED, (0): All Image types are allowed
    # - ONLY_CRC32_OR_CRYPTO_SIG, (1): Only CRC32 or cryptographically signed (CMAC or PKI - ECDSA/ MLDSA) images are
    # allowed
    # - ONLY_CRYPTO_SIGNED, (2): Only cryptographically Signed (CMAC or PKI - ECDSA/ MLDSA) images are allowed
    # - ONLY_PKI_SIGNED, (3): Only PKI signed (ECDSA or MLDSA) images are allowed
    # Possible options: <ALL_IMAGE_TYPES_ALLOWED, ONLY_CRC32_OR_CRYPTO_SIG, ONLY_CRYPTO_SIGNED, ONLY_PKI_SIGNED>
    SEC_BOOT_EN: ALL_IMAGE_TYPES_ALLOWED
    # ----------------------------------------===== LP_SEC_BOOT [Optional] =====----------------------------------------
    # Description: Offset: 3b, Width: 2b, Secure boot option for low-power wake from power-down & deep-powerdown. For
