    # - ON_FAIL_ISP_RECOVERY, (2): On failure enter ISP mode for recovery
    # - ON_FAIL_LOCK_DEVICE, (3): On failure lock the device to enforce power-cycle
    # Possible options: <NOT_INCLUDED, ON_FAIL_CONTINUE_BOOT, ON_FAIL_ISP_RECOVERY, ON_FAIL_LOCK_DEVICE>
    FIPS_KDF_STEN: NOT_INCLUDED
    # ----------------------------------------===== DIS_NXP_FW [Optional] =====-----------------------------------------
    # Description: Offset: 30b, Width: 2b, Block NXP signed SB3 loading
    # - ALLOW_NXP_SIGNED_SB3_FW_0, (0): Allow NXP signed SB3 FW
    # - DISABLE_NXP_SIGNED_SB3_FW, (1): Disable NXP signed SB3 FW
    # - ALLOW_OEM_NXP_SIGNED_SB3, (2): Allow only OEM + NXP signed SB3 FW
