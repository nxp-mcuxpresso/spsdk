  CC_SOCU_DFLT:
    # -------------------------------------------===== NIDEN [Optional] =====-------------------------------------------
    # Description: Offset: 0b, Width: 1b, Non Secure non-invasive debug Fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    NIDEN: DISABLED
    # -------------------------------------------===== DBGEN [Optional] =====-------------------------------------------
    # Description: Offset: 1b, Width: 1b, Non Secure debug Fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    DBGEN: DISABLED
    # ------------------------------------------===== SPNIDEN [Optional] =====------------------------------------------
    # Description: Offset: 2b, Width: 1b, Secure non-invasive debug Fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    SPNIDEN: DISABLED
    # ------------------------------------------===== SPIDEN [Optional] =====-------------------------------------------
    # Description: Offset: 3b, Width: 1b, Secure invasive debug Fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    SPIDEN: DISABLED
    # ----------------------------------------===== ISP_CMD_EN [Optional] =====-----------------------------------------
    # Description: Offset: 6b, Width: 1b, ISP command Fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    ISP_CMD_EN: DISABLED
    # -----------------------------------------===== FA_CMD_EN [Optional] =====-----------------------------------------
    # Description: Offset: 7b, Width: 1b, Controls enablement of Set_FA & Set_Brick commands are fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    FA_CMD_EN: DISABLED
    # -----------------------------------------===== ME_CMD_EN [Optional] =====-----------------------------------------
    # Description: Offset: 8b, Width: 1b, Mass erase flash command fixed state
    # - DISABLED, (0): Disabled
    # - ENABLED, (1): Enabled
    # Possible options: <DISABLED, ENABLED>
    ME_CMD_EN: DISABLED
    # ---------------------------------------===== ME_DEVCFG_DIS [Optional] =====---------------------------------------
    # Description: Offset: 13b, Width: 1b, Disable erasing of DEVCFG page on mass erase command
    # - DISABLED, (0): DVCFG page erase is Disabled
    # - ALLOWED, (1): DEVCFG page erase is allowed
    # Possible options: <DISABLED, ALLOWED>
    ME_DEVCFG_DIS: DISABLED
    # ---------------------------------------===== DBG_KEYFLUSH [Optional] =====----------------------------------------
    # Description: Offset: 14b, Width: 1b, Flush keys in SGI keystore before enabling debug access
    # - SGI_KEYS_ARE_RETAINED, (0): SGI keys are retained
    # - SGI_KEYS_CLEARED, (1): SGI Keys are cleared before debug access is granted
    # Possible options: <SGI_KEYS_ARE_RETAINED, SGI_KEYS_CLEARED>
    DBG_KEYFLUSH: SGI_KEYS_ARE_RETAINED
    # ----------------------------------------===== UUID_CHECK [Optional] =====-----------------------------------------
    # Description: Offset: 15b, Width: 1b, Enforce UUID match during Debug authentication
