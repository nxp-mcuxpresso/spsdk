# ========================  PFR CFPA_CMPA configuration template for mcxa457, Revision: latest  ========================

# ======================================================================================================================
#                                                 == General Options ==
# ======================================================================================================================
# -------------------------------------===== The chip family name [Required] =====--------------------------------------
# Description: NXP chip family identifier.
family: mcxa457
# -----------------------------------------===== MCU revision [Optional] =====------------------------------------------
# Description: Revision of silicon. The 'latest' name, means most current revision.
# Possible options: <a0, latest>
revision: latest
# ------------------------------------===== Configuration area type [Required] =====------------------------------------
# Description: PFR / IFR type
# Possible options: <CFPA_CMPA, cfpa_cmpa>
type: CMPA
# --------------------------------------------===== mcxa457 [Required] =====--------------------------------------------
# settings_update: pfr_update.yaml
settings:
  # ------------------------------------------===== BOOT_CFG0 [Optional] =====------------------------------------------
  # Description: Offset: 0x00000200, Width: 32b; boot cfg0
  BOOT_CFG0:
    # ---------------------------------------===== IFLASH_BOOTEN [Optional] =====---------------------------------------
    # Description: Offset: 0b, Width: 1b, Enable internal flash as primary boot media
    # - DISABLED, (0): disabled
    # - ENABLED__(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED__(DEFAULT)>
    IFLASH_BOOTEN: DISABLED
    # --------------------------------------===== IFLASH_DUAL_EN [Optional] =====---------------------------------------
    # Description: Offset: 1b, Width: 1b, Enable dual image boot from internal flash as primary boot media
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    IFLASH_DUAL_EN: DISABLED
    # ---------------------------------------===== EFLASH_BOOTEN [Optional] =====---------------------------------------
    # Description: Offset: 2b, Width: 1b, Enable external flash (FlexSPI) as primary boot media
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    EFLASH_BOOTEN: DISABLED
    # --------------------------------------===== EFLASH_DUAL_EN [Optional] =====---------------------------------------
    # Description: Offset: 3b, Width: 1b, Enable dual image boot from external flash as primary boot media
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    EFLASH_DUAL_EN: DISABLED
    # ----------------------------------------===== REC_FLEXSPI [Optional] =====----------------------------------------
    # Description: Offset: 4b, Width: 1b, Enable external flash(FlexSPI) as recovery boot media
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    REC_FLEXSPI: DISABLED
    # -----------------------------------------===== REC_LSPI [Optional] =====------------------------------------------
    # Description: Offset: 5b, Width: 1b, Enable external flash(LSPI) as recovery boot media
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    REC_LSPI: DISABLED
    # ----------------------------------------===== REC_BOOT_EN [Optional] =====----------------------------------------
    # Description: Offset: 8b, Width: 2b, Recovery boot enable
    # - DISABLED, (0): disabled
    # - ENABLED_1, (1): Enabled
    # - ENABLED_2, (2): Enabled
    # - ENABLED_3, (3): Enabled
    # Possible options: <DISABLED, ENABLED_1, ENABLED_2, ENABLED_3>
    REC_BOOT_EN: DISABLED
    # ----------------------------------------===== BOOT_SPEED [Optional] =====-----------------------------------------
    # Description: Offset: 12b, Width: 2b, Boot speed. Selects the core frequency and voltage to use during ROM
    # execution. 00b: 48MHz, FRO192, MD mode // default boot speed. If CMPA header is not valid, should boot from 48MHz
    # MD mode. 01b: 96MHz, FRO192, SD mode 10b: 200MHz, SPLL, OD mode 11b: 250MHz, SPLL, OD mode // The actual speed
    # will be depending on test results
    BOOT_SPEED: 0
    # ----------------------------------------===== CMPA_HEADER [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 16b, CMPA Header marker should be set to 0x5963. After this header is set, all
    # non-zero values will take effect; leaving all settings at 0xff will cause undefined behavior. It is recommended to
    # set all values to 0x00 before setting the CMPA header value
    CMPA_HEADER: 22883
  # ------------------------------------------===== BOOT_CFG1 [Optional] =====------------------------------------------
  # Description: Offset: 0x00000204, Width: 32b; BOOT CFG1
  BOOT_CFG1:
    # ----------------------------------------===== ISP_UART_EN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 1b, ISP interface enable
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    ISP_UART_EN: DISABLED
    # ----------------------------------------===== ISP_SPI_EN [Optional] =====-----------------------------------------
    # Description: Offset: 1b, Width: 1b, ISP interface enable
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    ISP_SPI_EN: DISABLED
    # ----------------------------------------===== ISP_CAN_EN [Optional] =====-----------------------------------------
    # Description: Offset: 2b, Width: 1b, ISP interface enable
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    ISP_CAN_EN: DISABLED
    # ----------------------------------------===== ISP_I2C_EN [Optional] =====-----------------------------------------
    # Description: Offset: 3b, Width: 1b, ISP interface enable
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    ISP_I2C_EN: DISABLED
    # ----------------------------------------===== ISP_USB_EN [Optional] =====-----------------------------------------
    # Description: Offset: 4b, Width: 1b, ISP interface enable
    # - DISABLED, (0): disabled
    # - ENABLED_(DEFAULT), (1): enabled (default)
    # Possible options: <DISABLED, ENABLED_(DEFAULT)>
    ISP_USB_EN: DISABLED
    # ---------------------------------------===== ISP_PIN_ENTRY [Optional] =====---------------------------------------
    # Description: Offset: 8b, Width: 2b, Disable ISP mode entry through pin assertion
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_PIN_ENTRY: ISP_ENTRY_ALLOWED_0
    # ---------------------------------------===== ISP_DM_ENTRY [Optional] =====----------------------------------------
    # Description: Offset: 10b, Width: 2b, Disable ISP mode entry through debug mailbox command
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_DM_ENTRY: ISP_ENTRY_ALLOWED_0
    # ---------------------------------------===== ISP_API_ENTRY [Optional] =====---------------------------------------
    # Description: Offset: 12b, Width: 2b, Disable ISP mode entry through ROM API call. ISP mode can be entered through
    # ROM API invocation
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_API_ENTRY: ISP_ENTRY_ALLOWED_0
    # ---------------------------------------===== ISP_FT_ENTRY [Optional] =====----------------------------------------
    # Description: Offset: 14b, Width: 2b, Disable ISP mode entry on image authentication failure
    # - ISP_ENTRY_ALLOWED_0, (0): ISP entry allowed
    # - ISP_ENTRY_DISABLED, (1): ISP entry disabled
    # - ISP_ENTRY_ALLOWED_2, (2): ISP entry allowed
    # - ISP_ENTRY_ALLOWED_3, (3): ISP entry allowed
    # Possible options: <ISP_ENTRY_ALLOWED_0, ISP_ENTRY_DISABLED, ISP_ENTRY_ALLOWED_2, ISP_ENTRY_ALLOWED_3>
    ISP_FT_ENTRY: ISP_ENTRY_ALLOWED_0
    # -------------------------------------===== FLASH_REMAP_SIZE [Optional] =====--------------------------------------
    # Description: Offset: 16b, Width: 5b, Flash remap size. FLASH_REMAP_SIZE defines the size of the secondary boot
    # image (the range of flash addresses that will be remapped)in internal flash, where remapped address end =
    # (FLASH_REMAP_SIZE + 1)
    FLASH_REMAP_SIZE: 0
    # -------------------------------------===== EXT_CMPA_32B_SIZE [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 8b, Customer extended CMPA size expressed as multiple of 32 bytes. Total CMPA
    # area = CMPA_BASE_ADDR * 32
    EXT_CMPA_32B_SIZE: 0x1f
  # ---------------------------------------===== BOOT_LED_STATUS [Optional] =====---------------------------------------
  # Description: Offset: 0x00000208, Width: 32b; boot led status
  BOOT_LED_STATUS:
    # ---------------------------------------===== REC_BOOT_LED [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Assert on recovery boot. ROM drives the GPIO pin high, identified by this
    # field whenever primary boot fails and fall through to recovery boot source. Note, set the field to 0xFF as default
    # and when not using the feature. [4:0] GPIO Pin number. P7_31 is not supported. [7:5] GPIO port number. Ports 0 -3
    # are are allowed. If this feature is not use then set this field to 0xFF
    REC_BOOT_LED: 0
    # ---------------------------------------===== ISP_BOOT_LED [Optional] =====----------------------------------------
    # Description: Offset: 8b, Width: 8b, Assert on ISP fall through. ROM drives the GPIO pin high identified by this
    # field whenever primary boot fails and execution falls through to ISP mode. [[4:0] GPIO Pin number. P7_31 is not
    # supported. [7:5] GPIO port number. Only 0 - 4 ports are allowed. If this feature is not use then set this field to
    # 0xFF
    ISP_BOOT_LED: 0
    # ---------------------------------------===== BOOT_FAIL_LED [Optional] =====---------------------------------------
    # Description: Offset: 16b, Width: 8b, Assert on fatal errors during boot. ROM drives the GPIO pin high identified
    # by this field whenever primary boot fails due to fatal errors before locking-up/reset. [4:0] GPIO Pin number. P0_0
    # and P0_1 are not supported. [7:5] GPIO port number. Only 0 - 4 ports are allowed. If this feature is not use then
    # set this field to 0x00
    BOOT_FAIL_LED: 0
  # -----------------------------------------===== BOOT_TIMERS [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000020C, Width: 32b; boot timers
  BOOT_TIMERS:
    # ----------------------------------===== POWERDOWN_TIMEOUT_SECS [Optional] =====-----------------------------------
    # Description: Offset: 0b, Width: 16b, Powerdown timeout: ISP mode peripheral detection timeout value in seconds. If
    # a non-zero value is program and peripheral activity is not detected within the number of seconds specified here,
    # then the device will go to power down mode to conserve power
    POWERDOWN_TIMEOUT_SECS: 0
    # ------------------------------------===== WDOG_TIMEOUT_COUNT [Optional] =====-------------------------------------
    # Description: Offset: 16b, Width: 16b, WDOG timeout: Upper 16 bits of 24-bit count value in WWDT0_TC register
    # Timeout value in seconds. The lower 8 bits of WWDT0_TC are set to 0. When a non-zero value is programmed in this
    # field ROM configures the watch dog timer to reset the device on timeout before passing execution control to user
    # code
    WDOG_TIMEOUT_COUNT: 0
  # --------------------------------------===== LSPI_QFLASH_CFG0 [Optional] =====---------------------------------------
  # Description: Offset: 0x00000210, Width: 32b; lspi qflash cfg0
  LSPI_QFLASH_CFG0:
    # ------------------------------------===== QSPI_AUTO_PROBE_EN [Optional] =====-------------------------------------
    # Description: Offset: 0b, Width: 1b, Quad/Octal-SPI flash auto probe feature enable
    QSPI_AUTO_PROBE_EN: 0
    # -------------------------------------===== QSPI_DUMMY_CYCLES [Optional] =====-------------------------------------
    # Description: Offset: 7b, Width: 4b, Quad/Octal-SPI dummy cycles for read command. If a non-zero value is
    # programmed in this field, then the value is used to override the default number of dummy cycles for a fast read
    # command read from the serial flash’s SFDP information. Note: this field is only used if FLEXSPI_AUTO_PROBE_EN is
    # set
    QSPI_DUMMY_CYCLES: 0
    # --------------------------------------===== QSPI_FREQUENCY [Optional] =====---------------------------------------
    # Description: Offset: 11b, Width: 3b, Q/O-SPI flash interface frequency
    QSPI_FREQUENCY: 0
    # -------------------------------------===== QSPI_RESET_ENABLE [Optional] =====-------------------------------------
    # Description: Offset: 14b, Width: 1b, Use O/QSPI_RESET_PIN to reset the flash device
    QSPI_RESET_ENABLE: 0
    # -----------------------------------===== QSPI_RESET_GPIO_PORT [Optional] =====------------------------------------
    # Description: Offset: 15b, Width: 3b, When FLEXSPI_RESET_ENABLE = 1, this field determines the GPIO port number to
    # use for O/QSPI reset function
    QSPI_RESET_GPIO_PORT: 0
    # ------------------------------------===== QSPI_RESET_GPIO_PIN [Optional] =====------------------------------------
    # Description: Offset: 18b, Width: 5b, When FLEXSPI_RESET_ENABLE = 1, this field determines the GPIO pin number to
    # use for O/QSPI reset function
    QSPI_RESET_GPIO_PIN: 0
    # --------------------------------------===== QSPI_HOLD_TIME [Optional] =====---------------------------------------
    # Description: Offset: 23b, Width: 2b, Delay after reset before accessing Quad/Octal-SPI flash devices. Note, for
    # POR in addition to this wait time FLEXSPI_PWR_HOLD_TIME is added
    QSPI_HOLD_TIME: 0
    # ------------------------------------===== QSPI_PWR_HOLD_TIME [Optional] =====-------------------------------------
    # Description: Offset: 25b, Width: 4b, Delay after POR before accessing Quad/Octal-SPI flash devices in addition to
    # delay defined by FLEXSPI_HOLD TIME field
    QSPI_PWR_HOLD_TIME: 0
    # -----------------------------------------===== QSPI_PORT [Optional] =====-----------------------------------------
    # Description: Offset: 30b, Width: 2b, Quad SPI port
    # - PORTA1_(4-BIT), (0): portA1 (4-bit)
    # - PORTB1__(4-BIT), (1): portB1 (4-bit)
    # - PORTA1B1__(8-BIT), (2): portA1B1 (8-bit)
    # Possible options: <PORTA1_(4-BIT), PORTB1__(4-BIT), PORTA1B1__(8-BIT)>
    QSPI_PORT: PORTA1_(4-BIT)
  # --------------------------------------===== LSPI_QFLASH_CFG1 [Optional] =====---------------------------------------
  # Description: Offset: 0x00000214, Width: 32b; LSPI QFLASH CFG1
  LSPI_QFLASH_CFG1:
    # ------------------------------------===== QSPI_DELAY_CELL_NUM [Optional] =====------------------------------------
    # Description: Offset: 0b, Width: 7b, Delay cell numbers for Flash read sampling via DQS (either internal loopback
    # or external DQS). The value provided here is loaded into the FLEXSPIn_DLLnCR
    QSPI_DELAY_CELL_NUM: 0
    # -------------------------------------===== QSPI_IMAGE_OFFSET [Optional] =====-------------------------------------
    # Description: Offset: 7b, Width: 10b, Any offset in memory mapped FlexSPI Flash area could be remapped to offset
    # zero to support eXecute In Place (XIP) of image programmed at different offset. This allows to build all update
    # images with same RO base address, which are programmed at offset 0 or higher offset. FlLEXSPI_IMAGE_OFFSET field
    # specifies the offset location of the second image. FLEXSPI_REMAP_IMAGE_SIZE field specifies the size multiple to
    # determine the size of area to be remapped. If this field is left blank boot ROM will not enable FlexSPI remap
    # feature. The physical flash offset is computed as below: physical offset = FLEXSPI_IMAGE_OFFSET
    QSPI_IMAGE_OFFSET: 0
    # -----------------------------------===== QSPI_REMAP_IMAGE_SIZE [Optional] =====-----------------------------------
    # Description: Offset: 17b, Width: 4b, Any offset in memory mapped FlexSPI Flash area could be remapped to offset
    # zero to support eXecute In Place (XIP) of image programmed at different offset. This allows to build all update
    # images with same RO base address, which are programmed at offset 0 or higher offset. FLEXSPI_IMAGE_OFFSET field
    # specifies the offset location of second image. FLEXSPI_REMAP_IMAGE_SIZE field specifies the size multiple to
    # determine the size of area to be remapped. b'0000 Remap size = FLEXSPI_IMAGE_OFFSET
    QSPI_REMAP_IMAGE_SIZE: 0
  # ---------------------------------------===== LSPI_FLASH_CFG0 [Optional] =====---------------------------------------
  # Description: Offset: 0x00000218, Width: 32b; lspi flash cfg0
  LSPI_FLASH_CFG0: '0x00000000'
  # ---------------------------------------===== LSPI_FLASH_CFG1 [Optional] =====---------------------------------------
  # Description: Offset: 0x0000021C, Width: 32b; LSPI FLASH CFG1
  LSPI_FLASH_CFG1:
    # ---------------------------------------===== LSPI_SSEL_PIN [Optional] =====---------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default SPI_SSEL ISP pin. Identifies the pin to be used as SPI_SSEL
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    LSPI_SSEL_PIN: 0
    # ------------------------------------===== LSPI_SSEL_FUNC_SLOT [Optional] =====------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # REC_SPI_SSEL_PIN
    LSPI_SSEL_FUNC_SLOT: 0
    # ----------------------------------------===== LSPI_SSEL_X [Optional] =====----------------------------------------
    # Description: Offset: 28b, Width: 2b, SPI chip select number. FlexComm SPI interfaces supports up to four chip
    # selects
    LSPI_SSEL_X: 0
    # ---------------------------------------===== LSPI_PIN_CUST [Optional] =====---------------------------------------
    # Description: Offset: 30b, Width: 2b, Use customer defined pins for 1-bit SPI recovery boot pins
    LSPI_PIN_CUST: 0
  # ----------------------------------------===== ISP_UART_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000220, Width: 32b; isp uart cfg
  ISP_UART_CFG:
    # ----------------------------------------===== UART_RX_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default UART RX ISP pin. Identifies the pin to be used as UART_RX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    UART_RX_PIN: 0
    # -------------------------------------===== UART_RX_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by UART_RX_PIN
    UART_RX_FUNC_SLOT: 0
    # -------------------------------------===== UART_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for UART ISP mode
    UART_ISP_FLEXCOM: 0
    # ----------------------------------------===== UART_TX_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default UART TX ISP pin. Identifies the pin to be used as UART_TX
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    UART_TX_PIN: 0
    # -------------------------------------===== UART_TX_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # UART_TX_PIN
    UART_TX_FUNC_SLOT: 0
  # -----------------------------------------===== ISP_I2C_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000224, Width: 32b; isp i2c cfg
  ISP_I2C_CFG:
    # ----------------------------------------===== I2C_SCL_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default I2C SCL ISP pin. Identifies the pin to be used as I2C_SCL
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    I2C_SCL_PIN: 0
    # -------------------------------------===== I2C_SCL_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by I2C_SCL_PIN
    I2C_SCL_FUNC_SLOT: 0
    # --------------------------------------===== I2C_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for I2C ISP mode
    I2C_ISP_FLEXCOM: 0
    # ----------------------------------------===== I2C_SDA_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default I2C SDA ISP pin. Identifies the pin to be used as I2C_SDA
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    I2C_SDA_PIN: 0
    # -------------------------------------===== I2C_SDA_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # I2C_SDA_PIN
    I2C_SDA_FUNC_SLOT: 0
  # -----------------------------------------===== ISP_CAN_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000228, Width: 32b; isp can cfg
  ISP_CAN_CFG:
    # ----------------------------------------===== CAN_RX_PIN [Optional] =====-----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default CAN RX ISP pin. Identifies the pin to be used as CAN_RX pin.
    # [4:0] GPIO Pin number [7:5] GPIO port number
    CAN_RX_PIN: 0
    # -------------------------------------===== CAN_RX_FUNC_SLOT [Optional] =====--------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by CAN_RX_PIN
    CAN_RX_FUNC_SLOT: 0
    # ---------------------------------------===== CAN_ISP_INST [Optional] =====----------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the instance used for CAN ISP mode
    CAN_ISP_INST: 0
    # ----------------------------------------===== CAN_TX_PIN [Optional] =====-----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default CAN TX ISP pin. Identifies the pin to be used as CAN_TX pin.
    # [4:0] GPIO Pin number [7:5] GPIO port number
    CAN_TX_PIN: 0
    # -------------------------------------===== CAN_TX_FUNC_SLOT [Optional] =====--------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by CAN_TX_PIN
    CAN_TX_FUNC_SLOT: 0
    # ---------------------------------------===== CAN_BAUD_RATE [Optional] =====---------------------------------------
    # Description: Offset: 28b, Width: 4b, CAN baud rate. Baud rate configured during CAN ISP mode
    # - AUTO_BAUDRATE, (0): Auto baud detection (125K, 250K, 500K, 750K, 1M)
    # Possible options: <AUTO_BAUDRATE>
    CAN_BAUD_RATE: AUTO_BAUDRATE
  # ----------------------------------------===== ISP_SPI_CFG0 [Optional] =====-----------------------------------------
  # Description: Offset: 0x0000022C, Width: 32b; isp spi cfg0
  ISP_SPI_CFG0:
    # ----------------------------------------===== SPI_SCK_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default SPI_SCK ISP pin. Identifies the pin to be used as SPI_SCK
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_SCK_PIN: 0
    # -------------------------------------===== SPI_SCK_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by SPI_SCK_PIN
    SPI_SCK_FUNC_SLOT: 0
    # --------------------------------------===== SPI_ISP_FLEXCOM [Optional] =====--------------------------------------
    # Description: Offset: 12b, Width: 4b, Identifies the FlexComm used for SPI ISP mode
    SPI_ISP_FLEXCOM: 0
    # ---------------------------------------===== SPI_MOSI_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default SPI_MOSI ISP pin. Identifies the pin to be used as SPI_MOSI
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_MOSI_PIN: 0
    # ------------------------------------===== SPI_MOSI_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # SPI_MOSI_PIN
    SPI_MOSI_FUNC_SLOT: 0
  # ----------------------------------------===== ISP_SPI_CFG1 [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000230, Width: 32b; ISP SPI CFG1
  ISP_SPI_CFG1:
    # ---------------------------------------===== SPI_MISO_PIN [Optional] =====----------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default SPI_MISO ISP pin. Identifies the pin to be used as SPI_MISO
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_MISO_PIN: 0
    # ------------------------------------===== SPI_MISO_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # SPI_MISO_PIN
    SPI_MISO_FUNC_SLOT: 0
    # ---------------------------------------===== SPI_SSEL_PIN [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 8b, Override default SPI_SSEL ISP pin. Identifies the pin to be used as SPI_SSEL
    # pin. [4:0] GPIO Pin number [7:5] GPIO port number
    SPI_SSEL_PIN: 0
    # ------------------------------------===== SPI_SSEL_FUNC_SLOT [Optional] =====-------------------------------------
    # Description: Offset: 24b, Width: 4b, Identifies the ALT pin mux function to use for the pin selected by
    # SPI_SSEL_PIN
    SPI_SSEL_FUNC_SLOT: 0
    # --------------------------------------===== ISP_SPI_SSEL_X [Optional] =====---------------------------------------
    # Description: Offset: 28b, Width: 2b, SPI chip select number. FlexComm SPI interfaces supports up to four chip
    # selects
    ISP_SPI_SSEL_X: 0
  # -----------------------------------------===== ISP_USB_ID [Optional] =====------------------------------------------
  # Description: Offset: 0x00000234, Width: 32b; isp usb id
  ISP_USB_ID:
    # ---------------------------------------===== USB_Vendor_ID [Optional] =====---------------------------------------
    # Description: Offset: 0b, Width: 16b, usb vendor id
    USB_Vendor_ID: 0
    # --------------------------------------===== USB_Product_ID [Optional] =====---------------------------------------
    # Description: Offset: 16b, Width: 16b, usb product id
    USB_Product_ID: 0
  # -----------------------------------------===== ISP_USB_CFG [Optional] =====-----------------------------------------
  # Description: Offset: 0x00000238, Width: 32b; isp usb cfg
  ISP_USB_CFG:
    # ---------------------------------------===== USBx_VBUS_PIN [Optional] =====---------------------------------------
    # Description: Offset: 0b, Width: 8b, Override default USB0_VBUS_DETECT ISP pin. Identifies the pin to be used as
    # USB0_VBUS detect pin. [4:0] GPIO Pin number [7:5] GPIO port number
    USBx_VBUS_PIN: 0
    # ------------------------------------===== USBx_VBUS_FUNC_SLOT [Optional] =====------------------------------------
    # Description: Offset: 8b, Width: 4b, Identifies the pin mux function slot
    USBx_VBUS_FUNC_SLOT: 0
    # ---------------------------------------===== EXT_XTAL_CLK [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 3b, USB PHY input clock frequency. For USB high speed PHY external XTAL input is
    # needed. This field specifies the frequency of XTAL used on board. • 000 - 24 MHz input clock (Divide by 15) • 001
    # - 30 MHz input clock (Divide by 16) • 010 - 32 MHz input clock (Divide by 20) • 011 - Reserved • 100 - 20 MHz
    # input clock (Divide by 24) • 101 - 19.2 MHz input clock (Divide by 25) • 110 - 16 MHz input clock (Divide by 30) •
    # 111 - 12 MHz input clock (Divide by 40)
    EXT_XTAL_CLK: 0
    # ------------------------------------------===== PRE_DIV [Optional] =====------------------------------------------
    # Description: Offset: 19b, Width: 1b, Enable Pre-divider. Needed to support 48 MHz and other high speed crystals
    PRE_DIV: 0
  # ----------------------------------------===== ISP_MISC_CFG [Optional] =====-----------------------------------------
