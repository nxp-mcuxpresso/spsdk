    # - ENFORCE_PRESET_TZM_DATA_2, (2): Enforce preset TZM data in image manifest
    # - ENFORCE_PRESET_TZM_DATA_3, (3): Enforce preset TZM data in image manifest
    # Possible options: <IGNORED, ENFORCE_PRESET_TZM_DATA_1, ENFORCE_PRESET_TZM_DATA_2, ENFORCE_PRESET_TZM_DATA_3>
    ENF_TZM_PRESET: IGNORED
    # ---------------------------------------===== FAST_BOOT_EN [Optional] =====----------------------------------------
    # Description: Offset: 12b, Width: 2b, Fast boot enabled. First boot after update local-CMAC using DUK-Auth key is
    # created and used for sub-sequent boot authentication
    # - ENABLED, (0): Enabled
    # - FULL_BOOT_REQUIRED_1, (1): Full boot required
    # - FULL_BOOT_REQUIRED_2, (2): Full boot required
    # - FULL_BOOT_REQUIRED_3, (3): Full boot required
    # Possible options: <ENABLED, FULL_BOOT_REQUIRED_1, FULL_BOOT_REQUIRED_2, FULL_BOOT_REQUIRED_3>
    FAST_BOOT_EN: ENABLED
