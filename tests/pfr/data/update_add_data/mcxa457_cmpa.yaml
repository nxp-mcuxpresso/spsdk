    # - USE_CNSA1_CLASSIC_CRYPTO, (1): Use CNSA 1.0 specified classic crypto algorithms. (ECC P-384, SHA384 & AES256)
    # - USE_CNSA2_PQC_CRYPTO, (2): Use CNSA 2.0 specified PQC crypto algorithms.( MLDSA-87, ML-KEM, SHA384 & AES256)
    # - USE_HYBRID_PQC_CRYPTO, (3): Use hybrid (PQC + classic) crypto algorithms.(ECDSA P-384 + MLDSA-87, ML-KEM, SHA384
    # & AES256)
    # Possible options: <USE_PERFORMANCE_CRYPTO, USE_CNSA1_CLASSIC_CRYPTO, USE_CNSA2_PQC_CRYPTO, USE_HYBRID_PQC_CRYPTO>
    ENF_CNSA: USE_PERFORMANCE_CRYPTO
    # --------------------------------------===== ENF_TZM_PRESET [Optional] =====---------------------------------------
    # Description: Offset: 10b, Width: 2b, TrustZone-M mode
    # - IGNORED, (0): Ignored
