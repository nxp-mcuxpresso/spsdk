    # - WP_ACT_IMG_STICKY_GLBAC2, (1): Write protect active image area with sticky lock. GLBAC2 is used. FLASH_ACL
    # settings are ignored
    # - WP_ACT_IMG_NOSTKY_GLBAC4, (2): Write protect active image area without sticky lock. GLBAC4 is used. FLASH_ACL
    # settings are ignored
    # - XOM_ACT_IMG_STICKY_GLBAC6, (3): XOM protect active image area with sticky lock. GLBAC6 is used. FLASH_ACL
    # settings are ignored
    # Possible options: <PROTECT_CFPA_FLASH_ACL, WP_ACT_IMG_STICKY_GLBAC2, WP_ACT_IMG_NOSTKY_GLBAC4,
