    # - ON_FAIL_ISP_RECOVERY, (2): On failure enter ISP mode for recovery
    # - ON_FAIL_LOCK_DEVICE, (3): On failure lock the device to enforce power-cycle
    # Possible options: <NOT_INCLUDED, ON_FAIL_CONTINUE_BOOT, ON_FAIL_ISP_RECOVERY, ON_FAIL_LOCK_DEVICE>
    FIPS_CMAC_STEN: NOT_INCLUDED
    # ---------------------------------------===== FIPS_KDF_STEN [Optional] =====---------------------------------------
    # Description: Offset: 26b, Width: 2b, Enable self-test for KDF block on power-up. Needed for FIPS certification. If
    # this field is non-zero run self-test and log result in SYSCON->ELS_AS_BOOT_LOG1[FIPS]
    # - NOT_INCLUDED, (0): not included
