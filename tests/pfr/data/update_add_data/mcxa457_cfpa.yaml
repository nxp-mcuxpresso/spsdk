    # ---------------------------------------===== CFPA_LC_STATE [Optional] =====---------------------------------------
    # Description: Offset: 0b, Width: 8b, Life cycle state. This field is used to advance life cycle state to OEM LC
    # states (Develop, Develop2, In-Field, In-field locked, Bricked, FA). Below are the allowed values for this field.
    # Use of other values may lead to bricked state
    # - DEVELOP__STATE, (3): Develop state
    # - DEVELOP_2__STATE, (7): Develop 2 state
    # - IN-FIELD_STATE, (15): In-field state
    # - BRICKED_STATED, (90): Bricked stated
    # - FA_STATE, (165): FA state
    # - IN-FIELD_LOCKED_STATE, (207): In-field locked state
    # Possible options: <DEVELOP__STATE, DEVELOP_2__STATE, IN-FIELD_STATE, BRICKED_STATED, FA_STATE, IN-
    # FIELD_LOCKED_STATE>
    CFPA_LC_STATE: DEVELOP__STATE
    # ----------------------------------------===== CFPA_HEADER [Optional] =====----------------------------------------
    # Description: Offset: 16b, Width: 16b, CFPA Header marker should be set to 0x9635. After this header is set, all
    # non-zero values will take effect; leaving all values set to 0xff will cause undefined behavior. It is recommended
    # to set all values to 0x00 before setting the CFPA header
    CFPA_HEADER: 38453
