---
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
version: "0.2"
dictionaryDefinitions:
  - name: project-words
    path: "./project-words.txt"
    addWords: true
dictionaries:
  - project-words
ignorePaths:
  - "venv**"
  - "__pycache__**"
  - "_build**"
  - "/project-words.txt"
  - "approved_packages.json"
  - "reports/**"
  - "build/**"
  - "dist/**"
  - "*egg-info/**"
  - "tests/utils/data/file_special.txt"
  - "spsdk/__version__.py"
  - "docs/examples"
  - "docs/_prebuild"
  - "docs/_static"
  - "docs/make.bat"
  - "docs/Makefile"
  - "docs/html_schemas"
  - "*.srec"
  - "*.s19"
  - "*.mex"
  - "*.hex"
  # Binary and encoded files — scanning these is slow and produces false positives
  - "**/*.bin"
  - "**/*.bin-*"
  - "**/*.pink"
  - "**/*.pyc"
  - "**/*.der"
  - "**/*.pem"
  - "**/*.pub"
  - "**/*.crt"
  - "**/*.cert"
  - "**/*.sb"
  - "**/*.sb2"
  - "**/*.sb3"
  - "**/*.sb4"
  - "**/*.bcf"
  - "**/*.elf"
  - "**/*.axf"
  - "**/*.out"
  - "**/*.img"
  - "**/*.imx"
  - "**/*.xip"
  - "**/*.simg"
  - "**/*.zip"
  - "**/*.sqlite"
  # Jupyter notebooks contain base64-encoded outputs that generate thousands of false positives
  - "**/*.ipynb"

