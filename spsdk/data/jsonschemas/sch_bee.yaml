bee_output:
  type: object
  title: Basic Settings
  properties:
    output_folder:
      type: string
      title: BEE output folder
      description: Folder name to store generated BEE output
      template_value: bee_output

    output_name:
      type: string
      title: Output binary file name
      description: File name of the encrypted file, output_folder/output_name or full path (.bin will be appended)
      template_value: "encrypted"

    header_name:
      type: string
      title: File name of the exported BEE region headers
      description: output_folder/header_name or full path + index will be appended (.bin will be appended)
      template_value: "bee_ehdr"

    # Add data_blobs configuration similar to OTFAD
    data_blobs:
      type: array
      title: Data blobs list
      description: List of all data blobs to be encrypted
      items:
        type: object
        required: [data, address]
        properties:
          data:
            type: string
            title: Plain Text data blob
            description: Path to binary file with plain text data to be encrypted
            format: file
            template_value: my_data.bin

          address:
            type: [number, string]
            title: Data blob address
            description: Data blob address where the data should be loaded
            format: number
            template_value: "0x60001000"

  required: [output_folder]
bee:
  type: object
  title: BEE Settings
  required: [engine_selection, bee_engine]
  properties:
    engine_selection:
      type: string
      title: Engine selection
      description: BEE Engine Selection, engine0, engine1 or both engines
      enum: ["engine0", "engine1", "both"]
      template_value: "engine0"

    engine_key_selection:
      type: string
      title: Engine Key selection (deprecated)
      description: Deprecated. Use engine_key, engine_iv and engine_counter fields
        in bee_cfg to specify keys explicitly. If not specified, random keys are
        generated and saved to output folder.
      enum: ["random", "zero"]
      skip_in_template: True

    bee_engine:
      title: Bee engines
      description: Configuration of BEE engines
      type: array
      minItems: 1
      maxItems: 2
      items:
        oneOf:
          - type: object
            title: Engine Config
            description: BEE engine configuration
            required: [bee_cfg]
            properties:
              bee_cfg:
                type: object
                required: [user_key]
                properties:
                  user_key:
                    type: string
                    title: User AES-128 key
                    description: AES key for encryption (sw_key burned into fuses).
                      Could be defined as hex value or path to a binary file.
                    format: file-or-hex-value
                    template_value: "0x0123456789abcdeffedcba9876543210"

                  engine_key:
                    type: string
                    title: Engine AES-128 KIB key
                    description: Optional AES-128 key used to encrypt PRDB in BEE header (CBC mode).
                      If not provided, a random key is generated and saved to output folder.
                      To reuse a previously generated key, provide the value from the saved key file.
                      Could be defined as hex value or path to a binary file.
                    format: file-or-hex-value
                    template_value: "0x00000000000000000000000000000000"

                  engine_iv:
                    type: string
                    title: Engine AES-128 KIB initialization vector
                    description: Optional AES-128 initialization vector for PRDB encryption (CBC mode).
                      If not provided, a random IV is generated and saved to output folder.
                      Could be defined as hex value or path to a binary file.
                    format: file-or-hex-value
                    template_value: "0x00000000000000000000000000000000"

                  engine_counter:
                    type: string
                    title: Engine AES-CTR counter (12 bytes)
                    description: Optional 12-byte nonce for AES-CTR data encryption. The last 4 bytes
                      (block counter) are always set to zero automatically.
                      If not provided, a random counter is generated and saved to output folder.
                      Could be defined as hex value or path to a binary file.
                    format: file-or-hex-value
                    template_value: "0x000000000000000000000000"

                  protected_region:
                    title: Protected region
                    description: List of protected regions, up to four regions
                    type: array
                    items:
                      type: object
                      required: [start_address, length, protected_level]
                      properties:
                        start_address:
                          type: [string, number]
                          title: Start address of protected region
                          description: Start address of protected region, it should be aligned to 1 KB (1024 B)
                          format: number
                          template_value: "0x60001000"

                        length:
                          type: [string, number]
                          title: Length of protected region
                          description: Length of protected region, it should be aligned to 1 KB (1024 B)
                          format: number
                          template_value: "0x4400"

                        protected_level:
                          type: number
                          title: Protected level
                          description: Protected level (0/1/2/3), 0 is default
                          format: number
                          template_value: 0
          - type: object
            title: Engine BinConfig
            description: BEE engine configuration with binary header
            required: [bee_binary_cfg]
            properties:
              bee_binary_cfg:
                type: object
                required: [header_path, user_key]
                properties:
                  header_path:
                    type: string
                    title: BEE header path
                    description: Path to the existing BEE header in binary form
                    template_value: bee_ehdr0.bin

                  user_key:
                    type: string
                    title: User AES-128 key
                    description: AES key that was used for header encryption.
                      Could be defined as hex value or path to a binary file.
                    format: file-or-hex-value
                    template_value: "0x0123456789abcdeffedcba9876543210"
