alias: mcxn556s

# General MCU information
info:
  memory_map: # Memory map basic info
    internal-flash_ns:
      start_int: "0x0"
      size_int: "0x100000"
      external: false
    sram:
      start_int: "0x20000000"
      size_int: "0x58000"
      external: false
      non_xip_type: int_ram
