revisions:
  a0: {}
latest: a0

# General MCU information
info:
  use_in_doc: True # Include this MCU in generated documentation
  purpose: MCX Series
  # Web page of MCU representative
  web: https://www.nxp.com/products/processors-and-microcontrollers/arm-microcontrollers/general-purpose-mcus/mcx-arm-cortex-m:MCX-MCUS
  memory_map: # Memory map basic info #TODO check it
    internal-flash:
      start_int: 0x0
      size_int: 0xFFFF
      external: false
  isp:
    rom:
      protocol: mboot
      interfaces: ["uart", "spi", "i2c"]

features:
  # ======== Communication buffer section ========
  comm_buffer:
    address: 0x2000_0000
    size: 0x1000

  # ======== MBI section ========
  mbi:
    mbi_classes:
      plain_xip:
        image_type: PLAIN_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinMisrIvt
          - Mbi_ExportMixinApp
      crc_xip:
        image_type: CRC_XIP_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinMisrIvt
          - Mbi_ExportMixinApp
          - Mbi_ExportMixinCrcSign
      misr_xip:
        image_type: MISR_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinMisrIvt
          - Mbi_ExportMixinApp
          - Mbi_ExportMixinMisrSign
    images:
      xip:
        plain: plain_xip
        crc: crc_xip
        misr: misr_xip

  # ======== PFR section ========
  pfr:
    sub_features: [cmpa_cfg, cmpa_pswd, cmpa_lc]
    cmpa_cfg:
      address: 0x0100_2000
      reg_spec: cmpa_cfg.json
      computed_fields:
        field070: pfr_calculate_crc # CRC

    cmpa_pswd:
      address: 0x0100_2800
      reg_spec: cmpa_pswd.json
      computed_fields:
        field040: pfr_calculate_crc # CRC

    cmpa_lc:
      address: 0x0100_3000
      size: 16
      reg_spec: cmpa_lc.json

  # ======== DAT section ========
  dat:
    dmbox_ap_ix: 1
    sub_features:
      - password_auth

  # ======== Blhost section ========
  blhost:
    sub_features: [overridden_properties]
    overridden_properties:
      17: "life-cycle"

  # ======== Bootable image section ========
  bootable_image:
    mem_types:
      internal:
        segments:
          mbi: 0x00
