revisions:
  a0: {}
  a1: {}
latest: a1

# General MCU information
info:
  use_in_doc: True # Include this MCU in generated documentation
  purpose: MCX Series
  # Web page of MCU representative
  web: https://www.nxp.com
  memory_map: # Memory map basic info
    internal-flash:
      start_int: 0x0
      size_int: 0x8_0000
      external: false
    sram:
      start_int: 0x2800_0000
      size_int: 0x2_0000
      external: false
  isp:
    rom:
      protocol: mboot
      interfaces: ["uart", "spi", "i2c"]

features:
  # ======== Communication buffer section ========
  comm_buffer:
    address: 0x2800_0000
    size: 0x1000

  # ======== MBI section ========
  mbi:
    mbi_classes:
      plain_xip:
        image_type: PLAIN_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinIvt
          - Mbi_MixinImageVersion
          - Mbi_ExportMixinApp
      crc_xip:
        image_type: CRC_XIP_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinIvt
          - Mbi_MixinImageVersion
          - Mbi_ExportMixinApp
          - Mbi_ExportMixinCrcSign
      signed_xip:
        image_type: SIGNED_XIP_IMAGE
        mixins:
          - Mbi_MixinApp
          - Mbi_MixinIvt
          - Mbi_MixinLoadAddress
          - Mbi_MixinCertBlockV21
          - Mbi_MixinManifestCrc
          - Mbi_MixinImageSubType
          - Mbi_MixinImageVersion
          - Mbi_MixinFwVersion
          - Mbi_ExportMixinAppCertBlockManifest
          - Mbi_ExportMixinEccSign
    images:
      xip:
        plain: plain_xip
        crc: crc_xip
        signed: signed_xip

  # ======== DAT section ========
  dat:
    dmbox_ap_ix: 1 # Typical Index of debug mailbox access port is 2
    non_standard_statuses: # dictionary of non standard return statuses from various commands
      2: # Command get_crp_level
        0xFFFF_FFFF: ROP_STATE = 0xFFFF_FFFF (erased FLASH value), no ROP. Default for blank state
        0xEEBA_04C3: ROP_STATE = 0xEEBA_04C3. Debug disabled and unlocked, can be modified by customer, only limited debug mailbox commands available
        0x4939_8D8B: ROP_STATE = 0x4939_8D8B. Debug disabled and locked, cannot be modified by customer, only limited debug mailbox commands available
        0xB0AB_B703: ROP_STATE = 0xB0AB_B703. Debug disabled and locked, cannot be modified by customer, no debug mailbox commands available

  # ======== PFR section ========
  pfr:
    sub_features: [cmpa, cfpa]
    cmpa: # CMPA description
      erase_method: flash_erase
      address: 0x7_E000
      size: 336
      reg_spec: pfr_cmpa.json
      grouped_registers:
        - uid: cmpa_rotkh
          name: ROTKH
          width: 256
          config_as_hexstring: true
          reversed: true
          description:
            ROTKH field is compounded by 8 32-bit fields and contains Root key
            table hash
          sub_regs:
            - field0F0
            - field0F4
            - field0F8
            - field0FC
            - field100
            - field104
            - field108
            - field10C
    cfpa: # CFPA description (ROM API address; actual data stored incrementally from CMPA+0x150)
      erase_method: flash_erase
      address: 0x7_FFF0
      size: 16
      reg_spec: pfr_cfpa.json

  # ======== Bootable image section ========
  bootable_image:
    mem_types:
      internal:
        segments:
          mbi: 0x00

  # ======== Blhost section ========
  blhost:
    sub_features: [overridden_properties]
    overridden_properties:
      17: "life-cycle"

  # ======== Certificate block section ========
  cert_block:
    sub_features: [based_on_cert21]
    rot_type: "cert_block_21"

  # ======== TrustZone section ========
  tz:
    reg_spec: tz.json

  # ======== Secure binary v3.1 section ========
  sb31:
    supported_commands:
      - erase
      - load
      - execute
      - loadKeyBlob
      - reset
    key_wraps_version: 2

  sbc:
    header_version: 2
    supported_commands:
      - erase
      - load
      - loadKeyBlob
      - execute
      - reset
  # ======== Device Hardware Security Module (HSM) section ========
  devhsm:
    sub_features: [DevHsmSBc]
    key_blob_offset: 0x0
    key_blob_command_position: -1
    oem_share_output_size: 64
    oem_master_share_output_size: 96
    cust_cert_puk_output_size: 0
    hsm_genkey_keyblob_size: 40
    hsm_genkey_keyblob_puk_size: 0
    prehash_data_for_sign: sha256
    sb_signature_size: 16
    key_size: 40
    supported_commands:
      - erase
      - load
      - loadKeyBlob
      - execute
      - reset

  # ======== DICE configuration ========
  dice:
    buffer_address: 0x2800_0000
    buffer_size: 0x1000
    csr_address: 0x0100_0100
    csr_length: 208
    response_length: 324
    rkth_length: 32
    rkth_truncated_length: 32
    need_reset: true
